apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sops-secrets-operator
spec:
  chart:
    spec:
      chart: sops-secrets-operator
      version: 0.25.2
      sourceRef:
        kind: HelmRepository
        name: sops-secrets-operator
  interval: 1h
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: quay.io/isindir/sops-secrets-operator
      tag: 0.20.0@sha256:16d419a738ed9c47c21aa48ba227636e36a9656f85e761441a3feae027859dfb
    secretsAsFiles:
      - name: age
        mountPath: /etc/age
        secretName: sops-age
    extraEnv:
      - name: SOPS_AGE_KEY_FILE
        value: /etc/age/age.agekey

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sops-secrets-operator
spec:
  chart:
    spec:
      chart: sops-secrets-operator
      version: 0.25.0
      sourceRef:
        kind: HelmRepository
        name: sops-secrets-operator
  interval: 1h
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: quay.io/isindir/sops-secrets-operator
      tag: 0.18.0@sha256:65d146832d9b1bdbefd03a44fce9fbb7a6472edadc7c82c2e62510e28981a451
    secretsAsFiles:
      - name: age
        mountPath: /etc/age
        secretName: sops-age
    extraEnv:
      - name: SOPS_AGE_KEY_FILE
        value: /etc/age/age.agekey

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sops-secrets-operator
spec:
  chart:
    spec:
      chart: sops-secrets-operator
      version: 0.25.1
      sourceRef:
        kind: HelmRepository
        name: sops-secrets-operator
  interval: 1h
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: quay.io/isindir/sops-secrets-operator
      tag: 0.19.0@sha256:01721de250b571ea65a8cb1305b9ee79a27dc9a37b343ae6bda757a7ff096979
    secretsAsFiles:
      - name: age
        mountPath: /etc/age
        secretName: sops-age
    extraEnv:
      - name: SOPS_AGE_KEY_FILE
        value: /etc/age/age.agekey
